# Lint, dataset validation, secret scan, and stats build on every push/PR.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # pyproject.toml: ner-detector = { path = "../ner-detector" } (sibling of repo root)
      - name: Checkout ner-detector
        run: |
          git clone --depth 1 --branch master \
            "https://github.com/marfago-labs/ner-detector.git" \
            ../ner-detector

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          save-cache: false

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check scripts

      - name: Ruff (format)
        run: uv run ruff format --check scripts

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkout ner-detector
        run: |
          git clone --depth 1 --branch master \
            "https://github.com/marfago-labs/ner-detector.git" \
            ../ner-detector

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Validate gold JSONL
        run: uv run python scripts/validate_datasets.py

      - name: Regenerate statistics page
        run: uv run python scripts/build_stats_page.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkout ner-detector
        run: |
          git clone --depth 1 --branch master \
            "https://github.com/marfago-labs/ner-detector.git" \
            ../ner-detector

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          save-cache: false

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Mypy (scripts)
        run: uv run mypy scripts

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.24.2"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks

      - name: Gitleaks detect
        run: gitleaks detect --source . --config .gitleaks.toml --verbose
